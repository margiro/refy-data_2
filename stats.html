<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Journal Stats</title>
  <link rel="apple-touch-icon" href="icono.png">
  <link rel="icon" type="image/png" href="icono.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <style>
    :root {
      --bg:       #0f0f13;
      --surface:  #17171e;
      --card:     #1e1e28;
      --border:   rgba(255,255,255,0.07);
      --txt:      #f0efe8;
      --muted:    #7a7a8c;
      --accent:   #c8b560;
      --accent2:  #6c8ebf;
      --accent3:  #b56c8e;
      --good:     #6cbf8e;
      --bad:      #bf6c6c;
      --radius:   14px;
      --font-display: 'DM Serif Display', serif;
      --font-body:    'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--txt);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left h1 {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: -0.3px;
      color: var(--accent);
    }
    .header-left p { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

    /* ── CONTROLS ── */
    .btn {
      font-family: var(--font-body);
      font-size: 13px; font-weight: 600;
      padding: 9px 18px; border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card); color: var(--txt);
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .btn:hover { background: #2a2a36; border-color: rgba(255,255,255,0.15); }
    .btn.primary { background: var(--accent); color: #0f0f13; border-color: var(--accent); }
    .btn.primary:hover { background: #d9c870; }

    .range-selector { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .range-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .range-btn {
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      padding: 8px 15px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .range-btn.active { background: var(--accent); color: #0f0f13; border-color: var(--accent); }
    .range-btn:hover:not(.active) { background: #2a2a36; color: var(--txt); }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 100px 40px; text-align: center; gap: 16px;
    }
    .empty-state .icon { font-size: 56px; opacity: .4; }
    .empty-state h2 { font-family: var(--font-display); font-size: 24px; color: var(--muted); }
    .empty-state p { font-size: 14px; color: var(--muted); max-width: 340px; line-height: 1.6; }

    /* ── MAIN ── */
    .main { padding: 32px; display: flex; flex-direction: column; gap: 40px; }

    .section-title {
      font-family: var(--font-display); font-size: 20px; color: var(--accent);
      margin-bottom: 6px;
    }
    .section-sub { font-size: 12.5px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
    .section-head { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; }

    /* ── LAYOUT BLOCKS ── */
    .table-chart-block { display: grid; grid-template-columns: 1fr 1.4fr; gap: 20px; align-items: start; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 900px) {
      .table-chart-block, .two-col { grid-template-columns: 1fr; }
    }

    /* ── TABLE ── */
    .data-table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .data-table-title {
      padding: 14px 18px; font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.02);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }
    td.month-col { color: var(--muted); font-size: 12px; font-weight: 600; }
    td.val { font-variant-numeric: tabular-nums; }
    td.val-accent { color: var(--accent); font-weight: 600; }
    td.n-col { color: var(--muted); font-size: 11px; }
    td.bar-cell { width: 120px; }
    .val-up { color: var(--good); }
    .val-down { color: var(--bad); }
    .mini-bar-bg { background: rgba(255,255,255,0.06); border-radius: 3px; height: 6px; }
    .mini-bar-fill { height: 6px; border-radius: 3px; background: var(--accent); transition: width .4s; }
    .multi-table th, .multi-table td { padding: 8px 10px; font-size: 12px; }
    .multi-table th:first-child, .multi-table td:first-child { position: sticky; left: 0; background: var(--card); z-index:1; }
    .scroll-x { overflow-x: auto; }
    .lowN td { opacity: .5; }

    /* ── CHART CARD ── */
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .chart-card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 260px; }
    .chart-wrap-tall { position: relative; height: 340px; }
    .chart-wrap-lg { position: relative; height: 420px; }

    /* ── SUMMARY PILLS ── */
    .summary-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    .summary-pill { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; flex: 1; min-width: 120px; }
    .pill-value { font-family: var(--font-display); font-size: 28px; color: var(--accent); }
    .pill-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
    .pill-value.good { color: var(--good); }

    /* ── RANK LISTS (best/worst) ── */
    .rank-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-item { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; }
    .rank-score { font-family: var(--font-display); font-size: 24px; width: 46px; text-align: center; flex-shrink: 0; }
    .rank-score.good { color: var(--good); }
    .rank-score.bad { color: var(--bad); }
    .rank-body { flex: 1; min-width: 0; }
    .rank-date { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
    .chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: rgba(255,255,255,0.05); color: var(--muted); white-space: nowrap; }
    .chip.pos { background: rgba(108,191,142,0.14); color: #9fe0bd; }
    .chip.neg { background: rgba(191,108,108,0.14); color: #e0a0a0; }

    input[type=file] { display: none; }

    /* ── MÓVIL ── */
    @media (max-width: 600px) {
      .header { position: static; padding: 14px 16px; gap: 10px; }
      .header-left h1 { font-size: 22px; }
      .header-right { width: 100%; gap: 10px; }
      /* tira de rangos deslizable en horizontal en vez de amontonarse */
      .range-selector { width: 100%; flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
      .range-btn { flex: 0 0 auto; padding: 8px 14px; }
      .main { padding: 16px; gap: 30px; }
      .section-title { font-size: 18px; }
      .section-head { margin-bottom: 16px; }
      .chart-card { padding: 14px; }
      .chart-wrap { height: 240px; }
      .chart-wrap-tall { height: 320px; }
      .chart-wrap-lg { height: 360px; }
      .summary-pill { min-width: calc(50% - 6px); padding: 12px 14px; }
      .pill-value { font-size: 24px; }
      .data-table-title { padding: 12px 14px; }
      td, th { padding: 8px 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Journal Stats</h1>
    <p id="headerSub">Importa tu diario para empezar</p>
  </div>
  <div class="header-right">
    <div class="range-selector" id="rangeSelector"></div>
    <input type="file" id="fileInput" accept=".json">
    <button class="btn primary" onclick="document.getElementById('fileInput').click()">📂 Importar JSON</button>
  </div>
</div>

<div id="appContent">
  <div class="empty-state">
    <div class="icon">📊</div>
    <h2>Sin datos</h2>
    <p>Importa el JSON exportado desde tu diario para visualizar los resúmenes y tendencias.</p>
  </div>
</div>

<script>
(function() {
  "use strict";

  var MONTHS      = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  var MONTHS_FULL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  var WEEKDAYS    = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  var ACTIVITIES  = ["Family","School/work","Relationship","Friends/colleagues","Health","Hobbies","Sleep","Relaxing","Exercise"];
  var EMOTIONS    = ["Happy","Good","Confused/thoughtful","Bored/tired/neutral","Awkward","Stressed","Angry/ pissed","Anxious","Down"];

  // Valencia emocional
  var EMO_POS = ["Happy","Good"];
  var EMO_NEG = ["Stressed","Angry/ pissed","Anxious","Down"];
  var EMO_NEU = ["Confused/thoughtful","Bored/tired/neutral","Awkward"];
  // Orden para apilados: positivas (abajo) → neutras → negativas (arriba)
  var EMO_STACK_ORDER = EMO_POS.concat(EMO_NEU, EMO_NEG);
  var EMO_COLOR = {
    "Happy":"#6cbf8e", "Good":"#9ed6b0",
    "Confused/thoughtful":"#9a94b8", "Bored/tired/neutral":"#6f6f80", "Awkward":"#b0a06c",
    "Stressed":"#d99a5b", "Angry/ pissed":"#bf6c6c", "Anxious":"#c98ea0", "Down":"#a05b6c"
  };
  var PALETTE = ["#c8b560","#6c8ebf","#b56c8e","#6cbf8e","#bf8e6c","#8e6cbf","#6cbfb5","#bf6c6c","#8ebf6c","#c98ea0","#7a8cbf","#bf6ca0"];
  var CD = { color: "rgba(255,255,255,0.7)", grid: "rgba(255,255,255,0.06)", tip: "rgba(15,15,19,0.95)" };

  var STORAGE_KEY = "journal-stats:v1";
  var allEntries = [];
  var currentRange = null;     // {kind:'year'|'last'|'all', year?, months?}
  var charts = {};

  // ── UTILS ──────────────────────────────────────────────
  function pad2(n){ return String(n).padStart(2,"0"); }
  function f1(v){ return (Math.round(v*10)/10).toFixed(1); }
  function f2(v){ return v.toFixed(2); }
  function f3(v){ return v.toFixed(3); }
  function parseDate(str){ var p = str.slice(0,10).split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
  function dateStr(d){ return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()); }
  function weekdayIdx(str){ return (parseDate(str).getDay() + 6) % 7; } // 0=Lun .. 6=Dom
  function mean(arr){ return arr.length ? arr.reduce(function(a,b){return a+b;},0)/arr.length : 0; }
  function escapeHtml(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
  function chipClass(item){ return EMO_POS.indexOf(item)>=0 ? " pos" : (EMO_NEG.indexOf(item)>=0 ? " neg" : ""); }

  // ── IMPORT ─────────────────────────────────────────────
  document.getElementById("fileInput").addEventListener("change", function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error("Formato inválido");
        allEntries = data.filter(function(en) { return en && typeof en.date === "string"; });
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(allEntries)); } catch(se) {}
        init();
      } catch(err) {
        alert("Error al importar: " + err.message);
      }
    };
    reader.readAsText(file);
  });

  // ── AUTOLOAD ───────────────────────────────────────────
  (function() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var data = JSON.parse(raw);
        if (Array.isArray(data) && data.length > 0) {
          allEntries = data.filter(function(en) { return en && typeof en.date === "string"; });
          init();
        }
      }
    } catch(e) {}
  })();

  function init() {
    var years = getYears();
    if (!years.length) { alert("No hay entradas válidas"); return; }
    currentRange = { kind: "year", year: years[years.length - 1] };
    document.getElementById("headerSub").textContent = allEntries.length + " entradas · " + years.length + (years.length === 1 ? " año" : " años");
    renderRangeSelector(years);
    render();
  }

  function getYears() {
    var ys = {};
    allEntries.forEach(function(e) { ys[e.date.slice(0,4)] = true; });
    return Object.keys(ys).sort();
  }

  function rangeKeyOf(r){ return r.kind === "year" ? "y" + r.year : (r.kind === "last" ? "L" + r.months : "all"); }

  function renderRangeSelector(years) {
    var sel = document.getElementById("rangeSelector");
    sel.innerHTML = "";
    var opts = [];
    years.forEach(function(y){ opts.push({ label: y, range: { kind:"year", year:y } }); });
    opts.push({ sep: true });
    opts.push({ label: "3M",  range: { kind:"last", months:3 } });
    opts.push({ label: "6M",  range: { kind:"last", months:6 } });
    opts.push({ label: "12M", range: { kind:"last", months:12 } });
    opts.push({ label: "Todo", range: { kind:"all" } });

    opts.forEach(function(o) {
      if (o.sep) { var s = document.createElement("div"); s.className = "range-sep"; sel.appendChild(s); return; }
      var btn = document.createElement("button");
      btn.className = "range-btn" + (rangeKeyOf(o.range) === rangeKeyOf(currentRange) ? " active" : "");
      btn.textContent = o.label;
      btn.onclick = function() {
        currentRange = o.range;
        document.querySelectorAll(".range-btn").forEach(function(b){ b.classList.remove("active"); });
        btn.classList.add("active");
        render();
      };
      sel.appendChild(btn);
    });
  }

  // ── RANGE / BUCKETS ────────────────────────────────────
  function rangeBounds(r) {
    var today = new Date(); today.setHours(0,0,0,0);
    if (r.kind === "year") {
      var y = +r.year;
      var start = new Date(y, 0, 1);
      var end = (y === today.getFullYear()) ? today : new Date(y, 11, 31);
      return { start: start, end: end };
    }
    if (r.kind === "last") {
      var s = new Date(today); s.setMonth(s.getMonth() - r.months); s.setDate(s.getDate() + 1);
      return { start: s, end: today };
    }
    // all
    var dates = allEntries.map(function(e){ return e.date.slice(0,10); }).sort();
    return { start: dates.length ? parseDate(dates[0]) : today, end: today };
  }

  function monthBuckets(r, bounds) {
    if (r.kind === "year") {
      var out = [];
      for (var m = 0; m < 12; m++) out.push({ y: +r.year, m: m, key: r.year + "-" + pad2(m+1), label: MONTHS[m] });
      return out;
    }
    var res = [];
    var y = bounds.start.getFullYear(), m = bounds.start.getMonth();
    var ey = bounds.end.getFullYear(), em = bounds.end.getMonth();
    var guard = 0;
    while ((y < ey || (y === ey && m <= em)) && guard++ < 400) {
      res.push({ y: y, m: m, key: y + "-" + pad2(m+1), label: MONTHS[m] + "'" + String(y).slice(2) });
      m++; if (m > 11) { m = 0; y++; }
    }
    return res;
  }

  function entriesInBounds(bounds) {
    var s = dateStr(bounds.start), e = dateStr(bounds.end);
    return allEntries.filter(function(en){ var d = en.date.slice(0,10); return d >= s && d <= e; });
  }

  // ── AGGREGATE ──────────────────────────────────────────
  function aggregate(subset) {
    if (!subset.length) return null;
    var scores = subset.map(function(e){ return e.score || 0; });
    var avg = mean(scores);
    var variance = mean(scores.map(function(v){ var d=v-avg; return d*d; }));
    var range = Math.max.apply(null, scores) - Math.min.apply(null, scores);
    var totalEmo = subset.reduce(function(s,e){ return s + (e.emotions||[]).length; }, 0);
    var totalAct = subset.reduce(function(s,e){ return s + (e.activities||[]).length; }, 0);

    var emoPct = {}, actPct = {};
    EMOTIONS.forEach(function(em){
      var d = subset.filter(function(e){ return (e.emotions||[]).indexOf(em) >= 0; }).length;
      emoPct[em] = totalEmo > 0 ? (d/totalEmo)*100 : 0;
    });
    ACTIVITIES.forEach(function(a){
      var d = subset.filter(function(e){ return (e.activities||[]).indexOf(a) >= 0; }).length;
      actPct[a] = totalAct > 0 ? (d/totalAct)*100 : 0;
    });
    var posC = subset.reduce(function(s,e){ return s + (e.emotions||[]).filter(function(x){return EMO_POS.indexOf(x)>=0;}).length; }, 0);
    var negC = subset.reduce(function(s,e){ return s + (e.emotions||[]).filter(function(x){return EMO_NEG.indexOf(x)>=0;}).length; }, 0);
    var neuC = totalEmo - posC - negC;

    return {
      n: subset.length, avg: avg, variance: variance, std: Math.sqrt(variance), range: range,
      emoPct: emoPct, actPct: actPct,
      emoDensity: totalEmo/subset.length, actDensity: totalAct/subset.length,
      posShare: totalEmo>0 ? posC/totalEmo*100 : 0,
      neuShare: totalEmo>0 ? neuC/totalEmo*100 : 0,
      negShare: totalEmo>0 ? negC/totalEmo*100 : 0
    };
  }

  function computeBuckets(buckets) {
    return buckets.map(function(b){
      var sub = allEntries.filter(function(e){ return e.date.startsWith(b.key); });
      var agg = aggregate(sub);
      if (agg) { agg.month = b.m; agg.label = b.label; }
      return agg;
    });
  }

  // impacto: media con vs sin cada ítem, con ajuste por tamaño de muestra.
  // Al delta bruto le restamos un margen de incertidumbre Z·SE (límite inferior de
  // confianza sobre la magnitud), igual que el truco de rankings de reviews:
  //   SE = sd·√(1/n_con + 1/n_sin)   → con pocos registros el impacto se encoge hacia 0.
  var IMPACT_Z = 1.0; // súbelo (p.ej. 1.28 ó 1.645) para ser más conservador
  function computeImpact(entries, items, field) {
    var allScores = entries.map(function(e){ return e.score || 0; });
    var gAvg = mean(allScores);
    var sd = Math.sqrt(mean(allScores.map(function(v){ var d = v - gAvg; return d*d; }))) || 1e-9;
    return items.map(function(item){
      var withA = [], without = [];
      entries.forEach(function(e){
        var has = (e[field]||[]).indexOf(item) >= 0;
        (has ? withA : without).push(e.score || 0);
      });
      if (!withA.length || !without.length) return null;
      var aw = mean(withA), ao = mean(without);
      var delta = aw - ao;
      var se = sd * Math.sqrt(1/withA.length + 1/without.length);
      var margin = IMPACT_Z * se;
      var adj = delta >= 0 ? Math.max(0, delta - margin) : Math.min(0, delta + margin);
      return {
        item: item, nWith: withA.length, nWithout: without.length,
        avgWith: aw, avgWithout: ao, delta: delta, se: se, adj: adj
      };
    }).filter(function(x){ return x !== null; })
      .sort(function(a,b){ return b.adj - a.adj; });
  }

  function computeWeekday(entries) {
    var buckets = [[],[],[],[],[],[],[]];
    entries.forEach(function(e){ buckets[weekdayIdx(e.date)].push(e.score || 0); });
    return buckets.map(function(arr){ return { n: arr.length, avg: arr.length ? mean(arr) : null }; });
  }

  function computeHistogram(entries) {
    var scores = entries.map(function(e){ return e.score || 0; });
    var min = Math.min.apply(null, scores), max = Math.max.apply(null, scores);
    if (min === max) { return { labels: [min.toFixed(1)], counts: [scores.length], width: 0, dec: 1, min: min }; }
    var BINS = 20;
    var width = (max - min) / BINS;
    var counts = new Array(BINS).fill(0);
    scores.forEach(function(s){
      var idx = Math.min(BINS - 1, Math.floor((s - min) / width));
      counts[idx]++;
    });
    var dec = width < 0.1 ? 2 : 1;
    var labels = [];
    for (var i = 0; i < BINS; i++) labels.push((min + i * width).toFixed(dec));
    return { labels: labels, counts: counts, width: width, dec: dec, min: min };
  }

  function computeAdherence(entries, bounds) {
    var days = {};
    entries.forEach(function(e){ days[e.date.slice(0,10)] = true; });
    var sorted = Object.keys(days).sort();
    var registered = sorted.length;
    // Denominador = días transcurridos entre el PRIMER y el ÚLTIMO registro del rango.
    // Así no penalizan los días finales del periodo que todavía no has escrito
    // (p. ej. si el rango "este año" llega hasta hoy pero aún no has apuntado hoy).
    var totalDays = registered
      ? Math.round((parseDate(sorted[sorted.length-1]) - parseDate(sorted[0])) / 86400000) + 1
      : 0;
    // racha máxima de días consecutivos
    var best = registered ? 1 : 0, cur = registered ? 1 : 0;
    for (var i = 1; i < sorted.length; i++) {
      var diff = Math.round((parseDate(sorted[i]) - parseDate(sorted[i-1])) / 86400000);
      cur = (diff === 1) ? cur + 1 : 1;
      if (cur > best) best = cur;
    }
    return { registered: registered, totalDays: totalDays, pct: totalDays>0 ? registered/totalDays*100 : 0, streak: best };
  }

  // ── RENDER ─────────────────────────────────────────────
  var renderQueue = [];

  function render() {
    Object.keys(charts).forEach(function(k){ try { charts[k].destroy(); } catch(e){} });
    charts = {};
    renderQueue = [];

    var bounds  = rangeBounds(currentRange);
    var buckets = monthBuckets(currentRange, bounds);
    var monthly = computeBuckets(buckets);
    var entries = entriesInBounds(bounds);
    var labels  = buckets.map(function(b){ return b.label; });

    var content = document.getElementById("appContent");
    content.innerHTML = "";
    var main = document.createElement("div");
    main.className = "main";

    if (!entries.length) {
      content.innerHTML = '<div class="empty-state"><div class="icon">🗓️</div><h2>Sin datos en este periodo</h2><p>Prueba con otro rango temporal.</p></div>';
      return;
    }

    // ── Pills ──
    var active = monthly.filter(function(m){ return m !== null; });
    var yearAvg = mean(entries.map(function(e){ return e.score || 0; }));
    var adh = computeAdherence(entries, bounds);
    var bestMo = active.reduce(function(b,m){ return m.avg > b.avg ? m : b; }, active[0]);
    main.appendChild(makePills([
      { value: entries.length, label: "Entradas" },
      { value: f2(yearAvg), label: "Ánimo medio" },
      { value: bestMo ? bestMo.label : "-", label: "Mejor periodo" },
      { value: Math.round(adh.pct) + "%", label: "Adherencia (" + adh.registered + "/" + adh.totalDays + " días)" },
      { value: adh.streak, label: "Racha máx. (días)", good: true }
    ]));

    // ── 1. Evolución diaria + media móvil ──
    main.appendChild(dailySection(entries, yearAvg));

    // ── 2. Puntuación media por periodo (tabla + línea) ──
    main.appendChild(makeSection(
      "Puntuación media por periodo",
      "Media de ánimo en cada mes del rango. Línea discontinua = media del periodo.",
      simpleTable(monthly, "avg", "Media", f3, true, yearAvg),
      chartCard("chartAvg", "Ánimo medio")
    ));
    pushLineChart("chartAvg", labels, monthly, function(m){ return m ? +m.avg.toFixed(3) : null; }, "Ánimo medio", "#c8b560", 4, 6, yearAvg);

    // ── 2b. Desviación típica por periodo ──
    main.appendChild(makeSection(
      "Desviación típica del ánimo por periodo",
      "Cuánto oscila tu ánimo dentro de cada mes: mayor = más altibajos, menor = más estable.",
      simpleTable(monthly, "std", "Desv. típica", f3, false),
      chartCard("chartStd", "Desviación típica")
    ));
    pushLineChart("chartStd", labels, monthly, function(m){ return m ? +m.std.toFixed(3) : null; }, "Desv. típica", "#6c8ebf", 0, null);

    // ── 3 + 4. Histograma y día de semana (dos columnas) ──
    var hist = computeHistogram(entries);
    var wk = computeWeekday(entries);
    main.appendChild(twoColSection(
      "Distribución y patrón semanal",
      "Cómo se reparten tus puntuaciones y cómo varía el ánimo por día de la semana.",
      chartCard("chartHist", "Distribución de puntuaciones (nº de días)"),
      chartCard("chartWeekday", "Ánimo medio por día de la semana")
    ));
    pushBarChart("chartHist", hist.labels, hist.counts,
      "#6c8ebf", { yMin: 0, tooltipUnit: " días", xMaxTicks: 12, tight: true, hist: hist });
    pushWeekdayChart("chartWeekday", wk);

    // ── 5. Impacto actividades ──
    var actImpact = computeImpact(entries, ACTIVITIES, "activities");
    main.appendChild(fullSection(
      "Impacto de las actividades en el ánimo",
      "Ánimo medio los días que haces cada actividad frente a los que no, ajustado por nº de registros: a las que has marcado pocas veces se les encoge el impacto hacia 0 (menos fiable). Verde = te sienta bien, rojo = lo contrario.",
      chartCard("chartActImpact", "Impacto ajustado (penaliza n bajo)", "chart-wrap-tall")
    ));
    pushImpactChart("chartActImpact", actImpact);

    // ── 6. Impacto emociones ──
    var emoImpact = computeImpact(entries, EMOTIONS, "emotions");
    main.appendChild(fullSection(
      "Relación de las emociones con el ánimo",
      "Ánimo medio los días que registras cada emoción frente a los que no, ajustado por nº de registros (las poco frecuentes se encogen hacia 0).",
      chartCard("chartEmoImpact", "Impacto ajustado (penaliza n bajo)", "chart-wrap-tall")
    ));
    pushImpactChart("chartEmoImpact", emoImpact);

    // ── 7. Balance emocional ──
    main.appendChild(fullSection(
      "Balance emocional",
      "Reparto de emociones positivas / neutras / negativas en cada periodo (% del total de emociones registradas).",
      chartCard("chartBalance", "Positivas · Neutras · Negativas", "chart-wrap-tall")
    ));
    pushBalanceChart("chartBalance", labels, monthly);

    // ── 8. Emociones % ──
    main.appendChild(makeSection(
      "Emociones por periodo (%)",
      "Peso de cada emoción sobre el total de emociones registradas. Colores por valencia (verdes positivas, rojos negativas).",
      multiTable(monthly, EMOTIONS, "emoPct"),
      chartCard("chartEmo", "Área apilada", "chart-wrap-tall")
    ));
    pushStackedArea("chartEmo", labels, monthly, EMO_STACK_ORDER, "emoPct", function(item){ return EMO_COLOR[item] || "#888"; });

    // ── 9. Actividades % ──
    main.appendChild(makeSection(
      "Actividades por periodo (%)",
      "Peso de cada actividad sobre el total de actividades registradas.",
      multiTable(monthly, ACTIVITIES, "actPct"),
      chartCard("chartAct", "Área apilada", "chart-wrap-tall")
    ));
    pushStackedArea("chartAct", labels, monthly, ACTIVITIES, "actPct", function(item){ return PALETTE[ACTIVITIES.indexOf(item) % PALETTE.length]; });

    // ── 10. Densidad ──
    main.appendChild(fullSection(
      "Densidad de registro (media por día)",
      "Cuántas emociones y actividades marcas de media cada día.",
      chartCard("chartDensity", "Emociones/día · Actividades/día")
    ));
    pushDensityChart("chartDensity", labels, monthly);

    // ── 11. Mejores y peores días ──
    main.appendChild(bestWorstSection(entries));

    // ── 12. Comparación entre años (siempre con todos los datos) ──
    var years = getYears();
    if (years.length > 1) {
      main.appendChild(fullSection(
        "Comparación entre años",
        "Media de ánimo mes a mes, un color por año. Independiente del rango seleccionado.",
        chartCard("chartYears", "Ánimo medio por mes", "chart-wrap-tall")
      ));
      pushYearsChart("chartYears", years);
    }

    content.appendChild(main);
    requestAnimationFrame(function(){ renderQueue.forEach(function(fn){ fn(); }); });
  }

  // ── UI BUILDERS ────────────────────────────────────────
  function makePills(items) {
    var row = document.createElement("div");
    row.className = "summary-row";
    items.forEach(function(item) {
      var pill = document.createElement("div");
      pill.className = "summary-pill";
      pill.innerHTML = '<div class="pill-value' + (item.good ? " good" : "") + '">' + escapeHtml(item.value) + '</div><div class="pill-label">' + escapeHtml(item.label) + '</div>';
      row.appendChild(pill);
    });
    return row;
  }

  function sectionHead(title, sub) {
    var head = document.createElement("div");
    head.className = "section-head";
    head.innerHTML = '<div class="section-title">' + escapeHtml(title) + '</div>' +
                     (sub ? '<div class="section-sub">' + escapeHtml(sub) + '</div>' : '');
    return head;
  }

  function makeSection(title, sub, tableEl, chartEl) {
    var wrap = document.createElement("div");
    wrap.appendChild(sectionHead(title, sub));
    var block = document.createElement("div");
    block.className = "table-chart-block";
    block.appendChild(tableEl);
    block.appendChild(chartEl);
    wrap.appendChild(block);
    return wrap;
  }

  function twoColSection(title, sub, leftEl, rightEl) {
    var wrap = document.createElement("div");
    wrap.appendChild(sectionHead(title, sub));
    var block = document.createElement("div");
    block.className = "two-col";
    block.appendChild(leftEl);
    block.appendChild(rightEl);
    wrap.appendChild(block);
    return wrap;
  }

  function fullSection(title, sub, chartEl) {
    var wrap = document.createElement("div");
    wrap.appendChild(sectionHead(title, sub));
    wrap.appendChild(chartEl);
    return wrap;
  }

  function chartCard(id, label, wrapClass) {
    var card = document.createElement("div");
    card.className = "chart-card";
    card.innerHTML = '<div class="chart-card-title">' + escapeHtml(label) + '</div>' +
                     '<div class="' + (wrapClass || "chart-wrap") + '"><canvas id="' + id + '"></canvas></div>';
    return card;
  }

  function simpleTable(monthly, key, colLabel, fmt, showBar, refMean) {
    var wrap = document.createElement("div");
    wrap.className = "data-table-wrap";
    var titleEl = document.createElement("div");
    titleEl.className = "data-table-title";
    titleEl.textContent = colLabel + " por periodo";
    wrap.appendChild(titleEl);

    var vals = monthly.map(function(m){ return m ? m[key] : null; }).filter(function(v){ return v !== null; });
    var max = vals.length ? Math.max.apply(null, vals) : 1;

    var table = document.createElement("table");
    table.innerHTML = "<thead><tr><th>Periodo</th><th>" + colLabel + "</th><th>N</th>" + (showBar ? "<th>vs media</th>" : "") + "</tr></thead>";
    var tbody = document.createElement("tbody");

    monthly.forEach(function(m, i) {
      var tr = document.createElement("tr");
      var lbl = m ? m.label : MONTHS[i];
      if (!m) {
        tr.innerHTML = '<td class="month-col">' + lbl + '</td><td colspan="' + (showBar?3:2) + '" style="color:var(--muted)">—</td>';
      } else {
        var v = m[key];
        var cls = (showBar && refMean != null) ? (v >= refMean ? " val-up" : " val-down") : " val-accent";
        var barCell = "";
        if (showBar) {
          var barW = max > 0 ? Math.round((v/max)*100) : 0;
          barCell = '<td class="bar-cell"><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:' + barW + '%;background:' + (refMean!=null && v<refMean ? "var(--bad)" : "var(--good)") + '"></div></div></td>';
        }
        tr.innerHTML = '<td class="month-col">' + lbl + '</td><td class="val' + cls + '">' + fmt(v) + '</td><td class="n-col">' + m.n + '</td>' + barCell;
      }
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    return wrap;
  }

  function multiTable(monthly, items, key) {
    var wrap = document.createElement("div");
    wrap.className = "data-table-wrap scroll-x";
    var titleEl = document.createElement("div");
    titleEl.className = "data-table-title";
    titleEl.textContent = "Tabla por periodo (%)";
    wrap.appendChild(titleEl);

    var table = document.createElement("table");
    table.className = "multi-table";
    var hRow = "<thead><tr><th>Periodo</th><th>N</th>";
    items.forEach(function(item){
      var short = item.length > 8 ? item.slice(0,8) + "…" : item;
      hRow += "<th title='" + escapeHtml(item) + "'>" + escapeHtml(short) + "</th>";
    });
    hRow += "</tr></thead>";
    table.innerHTML = hRow;

    var tbody = document.createElement("tbody");
    monthly.forEach(function(m, i) {
      var tr = document.createElement("tr");
      var lbl = m ? m.label : MONTHS[i];
      if (!m) {
        var cols = '<td class="month-col">' + lbl + '</td><td class="n-col">—</td>';
        items.forEach(function(){ cols += '<td style="color:var(--muted)">—</td>'; });
        tr.innerHTML = cols;
      } else {
        if (m.n < 3) tr.className = "lowN";
        var cols = '<td class="month-col">' + lbl + '</td><td class="n-col">' + m.n + '</td>';
        items.forEach(function(item){
          var v = m[key][item] || 0;
          cols += '<td class="val">' + v.toFixed(1) + '</td>';
        });
        tr.innerHTML = cols;
      }
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    return wrap;
  }

  function bestWorstSection(entries) {
    var wrap = document.createElement("div");
    wrap.appendChild(sectionHead("Mejores y peores días", "Los 5 días de mayor y menor puntuación del periodo, con lo que registraste."));
    var block = document.createElement("div");
    block.className = "two-col";
    var sorted = entries.slice().sort(function(a,b){ return (b.score||0) - (a.score||0); });
    var top = sorted.slice(0, 5);
    var bottom = sorted.slice(-5).reverse();
    block.appendChild(rankCard("Mejores días", top, "good"));
    block.appendChild(rankCard("Peores días", bottom, "bad"));
    wrap.appendChild(block);
    return wrap;
  }

  function rankCard(title, list, cls) {
    var card = document.createElement("div");
    card.className = "chart-card";
    var html = '<div class="chart-card-title">' + escapeHtml(title) + '</div><div class="rank-list">';
    list.forEach(function(e){
      var tags = (e.emotions||[]).concat(e.activities||[]);
      var chips = tags.slice(0, 6).map(function(t){ return '<span class="chip' + chipClass(t) + '">' + escapeHtml(t) + '</span>'; }).join("");
      var titleTxt = e.title ? " · " + escapeHtml(e.title) : "";
      html += '<div class="rank-item"><div class="rank-score ' + cls + '">' + f1(e.score||0) + '</div>' +
              '<div class="rank-body"><div class="rank-date">' + escapeHtml(e.date) + titleTxt + '</div>' +
              '<div class="chips">' + (chips || '<span class="chip">sin etiquetas</span>') + '</div></div></div>';
    });
    html += '</div>';
    card.innerHTML = html;
    return card;
  }

  // ── CHART HELPERS ──────────────────────────────────────
  function baseScales(yMin, yMax) {
    var y = { grid: { color: CD.grid }, ticks: { color: CD.color, font: { size: 11 } } };
    if (yMin != null) y.min = yMin;
    if (yMax != null) y.max = yMax;
    return {
      x: { grid: { color: CD.grid }, ticks: { color: CD.color, font: { size: 11 }, maxRotation: 60, minRotation: 0, autoSkip: true, maxTicksLimit: 16 } },
      y: y
    };
  }

  function pushLineChart(id, labels, monthly, valFn, label, color, yMin, yMax, refMean) {
    renderQueue.push(function(){
      var cv = document.getElementById(id); if (!cv) return;
      var data = monthly.map(valFn);
      var datasets = [{
        label: label, data: data, borderColor: color, backgroundColor: color + "22",
        borderWidth: 2.5, fill: true, tension: 0.4, pointRadius: 4,
        pointBackgroundColor: color, pointBorderColor: "#0f0f13", pointBorderWidth: 2, spanGaps: false
      }];
      if (refMean != null) {
        datasets.push({ label: "Media", data: labels.map(function(){ return +refMean.toFixed(2); }),
          borderColor: "rgba(255,255,255,0.35)", borderDash: [5,5], borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0 });
      }
      charts[id] = new Chart(cv, {
        type: "line",
        data: { labels: labels, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: refMean != null, labels: { color: CD.color, boxWidth: 12, font: { size: 11 } } },
            tooltip: { backgroundColor: CD.tip, padding: 10 } },
          scales: baseScales(yMin, yMax)
        }
      });
    });
  }

  function pushBarChart(id, labels, data, color, opts) {
    opts = opts || {};
    renderQueue.push(function(){
      var cv = document.getElementById(id); if (!cv) return;
      var sc = baseScales(opts.yMin, opts.yMax);
      if (opts.xMaxTicks) sc.x.ticks.maxTicksLimit = opts.xMaxTicks;
      var ds = { data: data, backgroundColor: color + "cc", borderColor: color, borderWidth: 1.5, borderRadius: opts.tight ? 2 : 6 };
      if (opts.tight) { ds.categoryPercentage = 1.0; ds.barPercentage = 1.0; }
      charts[id] = new Chart(cv, {
        type: "bar",
        data: { labels: labels, datasets: [ds] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false },
            tooltip: { backgroundColor: CD.tip, padding: 10, callbacks: {
              title: function(items){
                if (opts.hist && opts.hist.width) {
                  var i = items[0].dataIndex, h = opts.hist;
                  return h.labels[i] + " – " + (h.min + (i+1)*h.width).toFixed(h.dec);
                }
                return items[0].label;
              },
              label: function(c){ return c.parsed.y + (opts.tooltipUnit || ""); } } } },
          scales: sc
        }
      });
    });
  }

  function pushWeekdayChart(id, wk) {
    renderQueue.push(function(){
      var cv = document.getElementById(id); if (!cv) return;
      var data = wk.map(function(d){ return d.avg != null ? +d.avg.toFixed(2) : null; });
      var valid = data.filter(function(v){ return v != null; });
      var lo = valid.length ? Math.max(0, Math.floor(Math.min.apply(null, valid) - 0.5)) : 0;
      var hi = valid.length ? Math.min(10, Math.ceil(Math.max.apply(null, valid) + 0.5)) : 10;
      charts[id] = new Chart(cv, {
        type: "bar",
        data: { labels: WEEKDAYS, datasets: [{ data: data, backgroundColor: "#c8b560cc", borderColor: "#c8b560", borderWidth: 1.5, borderRadius: 6 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false },
            tooltip: { backgroundColor: CD.tip, padding: 10, callbacks: {
              label: function(c){ return "Ánimo: " + (c.parsed.y != null ? c.parsed.y : "-") + "  (n=" + wk[c.dataIndex].n + ")"; } } } },
          scales: baseScales(lo, hi)
        }
      });
    });
  }

  function pushImpactChart(id, impact) {
    renderQueue.push(function(){
      var cv = document.getElementById(id); if (!cv) return;
      if (!impact.length) { cv.parentElement.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:40px;text-align:center;">Sin datos suficientes</div>'; return; }
      // Se representa el impacto AJUSTADO (penalizado por nº de registros).
      var labels = impact.map(function(x){ return x.item + " (" + x.nWith + ")"; });
      var data = impact.map(function(x){ return +x.adj.toFixed(3); });
      var border = impact.map(function(x){ return x.adj >= 0 ? "#6cbf8e" : "#bf6c6c"; });
      var bg = border.map(function(c){ return c + "cc"; });
      charts[id] = new Chart(cv, {
        type: "bar",
        data: { labels: labels, datasets: [{ data: data, backgroundColor: bg, borderColor: border, borderWidth: 1.5, borderRadius: 5 }] },
        options: {
          indexAxis: "y",
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false },
            tooltip: { backgroundColor: CD.tip, padding: 10, callbacks: {
              label: function(c){
                var x = impact[c.dataIndex];
                return [ "Impacto ajustado: " + (x.adj>=0?"+":"") + x.adj.toFixed(3),
                         "Δ bruto: " + (x.delta>=0?"+":"") + x.delta.toFixed(3) + "  (marcado " + x.nWith + " veces)",
                         "Con: " + f2(x.avgWith) + "  ·  Sin: " + f2(x.avgWithout) ];
              } } } },
          scales: {
            x: { grid: { color: CD.grid }, ticks: { color: CD.color, font: { size: 11 } }, title: { display: true, text: "Impacto ajustado en el ánimo (con − sin, penalizado por n)", color: CD.color, font: { size: 11 } } },
            y: { grid: { display: false }, ticks: { color: CD.color, font: { size: 11 } } }
          }
        }
      });
    });
  }

  function pushBalanceChart(id, labels, monthly) {
    renderQueue.push(function(){
      var cv = document.getElementById(id); if (!cv) return;
      var mk = function(key){ return monthly.map(function(m){ return m ? +m[key].toFixed(1) : null; }); };
      charts[id] = new Chart(cv, {
        type: "line",
        data: { labels: labels, datasets: [
          { label: "Positivas", data: mk("posShare"), borderColor: "#6cbf8e", backgroundColor: "rgba(108,191,142,0.55)", fill: true, tension: 0.35, pointRadius: 2, borderWidth: 1.5 },
          { label: "Neutras",   data: mk("neuShare"), borderColor: "#7a7a8c", backgroundColor: "rgba(122,122,140,0.45)", fill: true, tension: 0.35, pointRadius: 2, borderWidth: 1.5 },
          { label: "Negativas", data: mk("negShare"), borderColor: "#bf6c6c", backgroundColor: "rgba(191,108,108,0.55)", fill: true, tension: 0.35, pointRadius: 2, borderWidth: 1.5 }
        ] },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          plugins: { legend: { display: true, labels: { color: CD.color, boxWidth: 12, font: { size: 11 } } },
            tooltip: { backgroundColor: CD.tip, padding: 10, callbacks: { label: function(c){ return c.dataset.label + ": " + (c.parsed.y != null ? c.parsed.y + "%" : "-"); } } } },
          scales: { x: baseScales().x, y: { stacked: true, min: 0, max: 100, grid: { color: CD.grid }, ticks: { color: CD.color, font: { size: 11 }, callback: function(v){ return v + "%"; } } } }
        }
      });
    });
  }

  function pushStackedArea(id, labels, monthly, items, key, colorFn) {
    renderQueue.push(function(){
      var cv = document.getElementById(id); if (!cv) return;
      var datasets = items.map(function(item){
        var c = colorFn(item);
        return {
          label: item,
          data: monthly.map(function(m){ return m ? +(m[key][item]||0).toFixed(1) : null; }),
          borderColor: c, backgroundColor: c + "cc", fill: true, tension: 0.3, pointRadius: 0, borderWidth: 1
        };
      });
      charts[id] = new Chart(cv, {
        type: "line",
        data: { labels: labels, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          plugins: { legend: { display: true, labels: { color: CD.color, boxWidth: 10, font: { size: 10 } } },
            tooltip: { backgroundColor: CD.tip, padding: 10, callbacks: { label: function(c){ return c.dataset.label + ": " + (c.parsed.y != null ? c.parsed.y + "%" : "-"); } } } },
          scales: { x: baseScales().x, y: { stacked: true, min: 0, grid: { color: CD.grid }, ticks: { color: CD.color, font: { size: 11 }, callback: function(v){ return v + "%"; } } } }
        }
      });
    });
  }

  function pushDensityChart(id, labels, monthly) {
    renderQueue.push(function(){
      var cv = document.getElementById(id); if (!cv) return;
      charts[id] = new Chart(cv, {
        type: "line",
        data: { labels: labels, datasets: [
          { label: "Emociones/día", data: monthly.map(function(m){ return m ? +m.emoDensity.toFixed(2) : null; }), borderColor: "#b56c8e", backgroundColor: "#b56c8e22", fill: false, tension: 0.4, pointRadius: 3, borderWidth: 2.5, spanGaps: false },
          { label: "Actividades/día", data: monthly.map(function(m){ return m ? +m.actDensity.toFixed(2) : null; }), borderColor: "#6cbf8e", backgroundColor: "#6cbf8e22", fill: false, tension: 0.4, pointRadius: 3, borderWidth: 2.5, spanGaps: false }
        ] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: true, labels: { color: CD.color, boxWidth: 12, font: { size: 11 } } },
            tooltip: { backgroundColor: CD.tip, padding: 10 } },
          scales: baseScales(2, 4)
        }
      });
    });
  }

  function pushYearsChart(id, years) {
    renderQueue.push(function(){
      var cv = document.getElementById(id); if (!cv) return;
      var datasets = years.map(function(y, i){
        var c = PALETTE[i % PALETTE.length];
        var data = [];
        for (var m = 0; m < 12; m++) {
          var sub = allEntries.filter(function(e){ return e.date.startsWith(y + "-" + pad2(m+1)); });
          data.push(sub.length ? +mean(sub.map(function(e){ return e.score||0; })).toFixed(2) : null);
        }
        return { label: y, data: data, borderColor: c, backgroundColor: c + "22", fill: false, tension: 0.4, pointRadius: 3, borderWidth: 2.5, spanGaps: true };
      });
      charts[id] = new Chart(cv, {
        type: "line",
        data: { labels: MONTHS, datasets: datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          plugins: { legend: { display: true, labels: { color: CD.color, boxWidth: 12, font: { size: 11 } } },
            tooltip: { backgroundColor: CD.tip, padding: 10 } },
          scales: baseScales(4, 6)
        }
      });
    });
  }

  // ── DAILY SECTION ──────────────────────────────────────
  function dailySection(entries, refMean) {
    var wrap = document.createElement("div");
    wrap.appendChild(sectionHead("Evolución diaria del ánimo", "Cada punto es un día. La línea gruesa es la media móvil de 7 registros; la discontinua, la media del periodo."));
    wrap.appendChild(chartCard("chartDaily", "Ánimo diario · media móvil 7", "chart-wrap-lg"));
    renderQueue.push(function(){
      var cv = document.getElementById("chartDaily"); if (!cv) return;
      var sorted = entries.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
      var labels = sorted.map(function(e){ return e.date; });
      var scores = sorted.map(function(e){ return e.score || 0; });
      var ma = scores.map(function(_, i){
        var s = Math.max(0, i - 6);
        return +mean(scores.slice(s, i + 1)).toFixed(2);
      });
      charts["chartDaily"] = new Chart(cv, {
        type: "line",
        data: { labels: labels, datasets: [
          { label: "Ánimo diario", data: scores, borderColor: "rgba(200,181,96,0.35)", backgroundColor: "rgba(200,181,96,0.08)", fill: true, tension: 0.25, pointRadius: labels.length > 120 ? 0 : 2, pointBackgroundColor: "#c8b560", borderWidth: 1 },
          { label: "Media móvil (7)", data: ma, borderColor: "#c8b560", borderWidth: 2.5, pointRadius: 0, fill: false, tension: 0.35 },
          { label: "Media periodo", data: labels.map(function(){ return +refMean.toFixed(2); }), borderColor: "rgba(255,255,255,0.35)", borderDash: [5,5], borderWidth: 1.5, pointRadius: 0, fill: false }
        ] },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          plugins: { legend: { display: true, labels: { color: CD.color, boxWidth: 12, font: { size: 11 } } },
            tooltip: { backgroundColor: CD.tip, padding: 10 } },
          scales: { x: { grid: { color: CD.grid }, ticks: { color: CD.color, font: { size: 10 }, maxRotation: 60, autoSkip: true, maxTicksLimit: 14 } },
                    y: { min: 4, max: 6, grid: { color: CD.grid }, ticks: { color: CD.color, font: { size: 11 } } } }
        }
      });
    });
    return wrap;
  }

}());
</script>
</body>
</html>
